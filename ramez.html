<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login and Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      color: #333;
    }
    .page {
      max-width: 900px;
      margin: auto;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }
    h1,
    h2 {
      margin-top: 0;
      color: #333;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.3s ease;
      margin-top: 10px;
    }
    button:hover {
      background: #5568d3;
    }
    .message {
      margin-top: 15px;
      font-weight: bold;
      padding: 10px;
      border-radius: 5px;
      text-align: center;
    }
    .welcome-message {
      background: #e8f5e9;
      border-left: 4px solid #4caf50;
      padding: 15px;
      margin: 20px 0;
      border-radius: 5px;
      color: #2e7d32;
    }
    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 30px;
    }
    .btn-danger {
      width: auto;
      background: #f44336;
    }
    .btn-danger:hover {
      background: #da190b;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 600px) {
      .button-group {
        flex-direction: column;
      }
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="container" id="loginPage">
      <h2>Login Page</h2>
      <input type="text" id="username" placeholder="Username" autocomplete="username" />
      <input type="password" id="password" placeholder="Password (8-12 chars)" autocomplete="current-password" />
      <button type="button" onclick="login()">Login</button>
      <div class="message" id="message" aria-live="polite"></div>
    </div>

    <div class="container hidden" id="dashboardPage">
      <div class="welcome-message">
        <h1>✓ You have successfully logged in!</h1>
      </div>
      <div class="button-group">
        <button class="btn-danger" onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <script>
    const validUsername = "ramez";
    const validPassword = "22312286";

    function showSection(sectionId) {
      document.getElementById("loginPage").classList.toggle("hidden", sectionId !== "loginPage");
      document.getElementById("dashboardPage").classList.toggle("hidden", sectionId !== "dashboardPage");
      window.location.hash = sectionId === "dashboardPage" ? "dashboard" : "";
    }

    function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const message = document.getElementById("message");

      if (username === "" || password === "") {
        message.style.color = "red";
        message.innerText = "Fields cannot be empty";
        return;
      }

      const sqlPattern = /('|--|;|OR|AND|=)/i;
      if (sqlPattern.test(username)) {
        message.style.color = "red";
        message.innerText = "SQL Injection detected! Login failed.";
        return;
      }

      if (password.length < 8) {
        message.style.color = "red";
        message.innerText = "Rejected: Password below minimum length (8)";
        return;
      }
      if (password.length > 12) {
        message.style.color = "red";
        message.innerText = "Rejected: Password above maximum length (12)";
        return;
      }

      if (username === validUsername && password === validPassword) {
        message.style.color = "green";
        message.innerText = "User successfully logged in and redirected to dashboard";
        setTimeout(() => {
          showSection("dashboardPage");
        }, 500);
        return;
      }

      message.style.color = "red";
      message.innerText = "Invalid credentials";
    }

    function logout() {
      if (confirm("Are you sure you want to logout?")) {
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
        document.getElementById("message").innerText = "";
        showSection("loginPage");
      }
    }

    function initPage() {
      if (window.location.hash === "#dashboard") {
        showSection("dashboardPage");
      } else {
        showSection("loginPage");
      }
    }

    window.addEventListener("load", initPage);
  </script>
</body>
</html>
